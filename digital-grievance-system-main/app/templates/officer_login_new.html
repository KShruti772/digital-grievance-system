{% extends "auth_base.html" %}

{% block title %}Officer Login - Digital Grievance Redressal System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6">
        <div class="card auth-form-card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0"><i class="bi bi-briefcase"></i> Officer Login</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
                <hr>
                <p class="text-center">Don't have an account? <a href="/officer_register_new">Register here</a></p>
                <p class="text-center"><a href="/home">Back to Home</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
